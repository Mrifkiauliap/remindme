name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ─── 1. Checkout Code ──────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ─── 2. Setup SSH to VPS ───────────────────────────────────────────────
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      # ─── 3. Deploy via SSH ─────────────────────────────────────────────────
      - name: Deploy to VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e

            echo "==> Navigating to project directory..."
            cd ${{ secrets.VPS_PROJECT_PATH }}

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Rebuilding and restarting containers..."
            docker compose build --no-cache backend
            docker compose up -d --force-recreate backend cloudflared

            echo "==> Running database migrations..."
            docker compose exec -T backend node -e "
              const { drizzleKit } = require('drizzle-kit');
            " || docker compose exec -T backend sh -c "cd /app && npx drizzle-kit push --config drizzle.config.js" || true

            echo "==> Cleaning up unused Docker resources..."
            docker image prune -f

            echo "==> Deployment complete!"
          ENDSSH
